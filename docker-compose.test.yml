services:
  db:
    image: postgres:18
    container_name: twinspeak-test-db
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: twinspeak
    ports:
      - "5432:5432"
    networks:
      - twinspeak-test
    volumes:
      # Persistent data (PostgreSQL 18+ uses /var/lib/postgresql)
      - postgresdata:/var/lib/postgresql
      # Auto-initialize schema
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twinspeak"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: twinspeak-test-backend
    environment:
      - DB_URL=postgres://postgres:postgres@db:5432/twinspeak
    volumes:
      - ./backend:/app
      - /app/tmp
      - go-pkg-cache:/root/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    networks:
      - twinspeak-test
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "go test ./..."

networks:
  twinspeak-test:
    driver: bridge

volumes:
  postgresdata:
  go-pkg-cache:
  go-build-cache:
