name: twinspeak-test
services:
  db:
    image: postgres:18
    container_name: twinspeak-db-test
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: twinspeak
    networks:
      - twinspeak-test
    volumes:
      - postgresdatatest:/var/lib/postgresql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twinspeak"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: twinspeak-backend-test
    environment:
      - DB_URL=postgres://postgres:postgres@db:5432/twinspeak
    volumes:
      - ./backend:/app
      - /app/tmp
      - go-pkg-cache:/root/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    networks:
      - twinspeak-test
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "go test ./..."

networks:
  twinspeak-test:
    driver: bridge

volumes:
  postgresdatatest:
  go-pkg-cache:
  go-build-cache:
