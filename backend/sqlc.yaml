version: "2"
cloud:
    organization: ""
    project: ""
    hostname: ""
servers: []
sql: 
  - engine: "postgresql"
    queries: "query.sql"
    schema: "schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        overrides:
          # UUID convertion
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          # string convertion
          - db_type: "text"
            nullable: false
            go_type: string
          - db_type: "text"
            nullable: true
            go_type: 
              type: string
              pointer: true
          # time convertion
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type: 
              type: "time.Time"
              pointer: true
overrides:
    go: null
plugins: []
rules: []
options: {}
