  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: twinspeak-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/tmp
    networks:
      - twinspeak
    # depends_on:
    #   whisper:
    #     condition: service_healthy
    command: air -c .air.toml 

  # frontend:
  #   image: node:22-alpine
  #   container_name: twinspeak-frontend
  #   working_dir: /app
  #   environment:
  #     - NODE_ENV=development
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   networks:
  #     - twinspeak
  #   depends_on:
  #     - backend
  #   command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev --host"

  frontend-astro:
    image: node:22-alpine
    container_name: twinspeak-frontend-astro
    working_dir: /app
    environment:
      - NODE_ENV=development
    ports:
      - "4321:4321"
    volumes:
      - ./frontend-astro:/app
      - /app/node_modules
    networks:
      - twinspeak
    depends_on:
      - backend
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev --host"

  db:
    image: postgres
    container_name: twinspeak-db
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: twinspeek
    ports:
      - "5432:5432"
    networks:
      - twinspeak
    volumes:
      - postgresdata:/var/lib/postgresql

networks:
  twinspeak:
    driver: bridge

volumes: 
  libretranslate: 
  postgresdata:
